# Oracle DB 연결
spring.datasource.url=jdbc:oracle:thin:@[Oracle_DB_주소]:1521:[SID/서비스명]
spring.datasource.username=[Oracle_유저명]
spring.datasource.password=[Oracle_비밀번호]
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate (Oracle)
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT
jwt.secret=ikong-secret-key-must-be-at-least-32-characters-long
